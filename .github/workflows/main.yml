name: 24/7 YouTube Live Loop

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Start Continuous Streaming
      run: |
        while true; do
          ffmpeg -loop 1 -i ./lv.png -i ./audio.mp3 -c:v libx264 -preset ultrafast -tune stillimage -b:v 1500k -maxrate 1500k -bufsize 3000k -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 -shortest -f flv "rtmp://://youtube.com{{ secrets.YOUTUBE_STREAM_KEY }}"
          echo "Stream crashed or finished, restarting in 5 seconds..."
          sleep 5
        done
