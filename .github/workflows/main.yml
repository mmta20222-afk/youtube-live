name: 24/7 YouTube Live Loop

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Start Continuous Streaming
      run: |
        AUDIO_FILE=$(find . -name "*.mp3" | head -n 1)
        IMAGE_FILE=$(find . \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) | head -n 1)
        
        if [ -z "$AUDIO_FILE" ] || [ -z "$IMAGE_FILE" ]; then
          echo "Files missing! Using safe dummy stream mode..."
          while true; do
            ffmpeg -loop 1 -re -i "$IMAGE_FILE" -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 -c:v libx264 -preset ultrafast -tune stillimage -b:v 1500k -maxrate 1500k -bufsize 3000k -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -f flv "rtmp://://youtube.com{{ secrets.YOUTUBE_STREAM_KEY }}"
            sleep 2
          done
        else
          echo "Files found! Starting infinite music loop..."
          while true; do
            ffmpeg -loop 1 -re -i "$IMAGE_FILE" -stream_loop -1 -i "$AUDIO_FILE" -c:v libx264 -preset ultrafast -tune stillimage -b:v 1500k -maxrate 1500k -bufsize 3000k -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 -f flv "rtmp://://youtube.com{{ secrets.YOUTUBE_STREAM_KEY }}"
            echo "Stream disconnected or ended. Restarting in 2 seconds..."
            sleep 2
          done
        fi
